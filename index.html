<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>XÔI ĐẬU SPORTS VIP PRO</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1a1a1a; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #007bff; }
        .container { display: flex; flex: 1; height: calc(100vh - 55px); }
        .sidebar { width: 300px; background: #1a1a1a; overflow-y: auto; }
        .channel { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .channel:hover { background: #007bff; }
        #playerWrapper { flex: 1; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }
        /* Logo - Dùng link ảnh trực tiếp để chắc chắn nó hiện */
        .my-logo { position: absolute; top: 20px; right: 20px; width: 200px; z-index: 10; }
    </style>
</head>
<body>

<header>XÔI ĐẬU SPORTS VIP PRO</header>

<div class="container">
    <div class="sidebar" id="list"></div>
    <div id="playerWrapper">
        <img src="https://via.placeholder.com/200x100?text=LOGO+HERE" class="my-logo" alt="Logo">
        
        <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay></video>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
<script>
    const player = videojs('player');
    const channels = [
        { name: "[FIFA] Tín Hiệu Nguyên Bản", url: "https://hoiquan.dpdns.org/VTVGo/?WC-FiFa" },
        { name: "[HTV] HTV Thể Thao", url: "https://live.fptplay53.net/epzhd1/htvcthethao_vhls.smil/chunklist.m3u8" }
    ];

    const list = document.getElementById('list');
    channels.forEach(ch => {
        let el = document.createElement('div');
        el.className = 'channel';
        el.innerText = ch.name;
        el.onclick = () => {
            player.src({src: ch.url, type: 'application/x-mpegURL'});
            player.play();
        };
        list.appendChild(el);
    });
</script>
</body>
</html>
